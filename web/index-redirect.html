<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lattice - Redirecting...</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}
.container {
  text-align: center;
  padding: 40px;
}
h1 {
  font-size: 48px;
  margin-bottom: 20px;
  animation: fadeIn 0.5s;
}
p {
  font-size: 18px;
  margin-bottom: 30px;
  opacity: 0.9;
  animation: fadeIn 0.5s 0.2s both;
}
.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 30px;
}
.links {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  animation: fadeIn 0.5s 0.4s both;
}
.link {
  background: rgba(255,255,255,0.2);
  padding: 12px 24px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-weight: 600;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}
.link:hover {
  background: rgba(255,255,255,0.3);
  transform: translateY(-2px);
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="container">
  <h1>🚀 Lattice</h1>
  <p>Redirecting to Quick Start Guide...</p>
  <div class="spinner"></div>
  <div class="links">
    <a href="quickstart.html" class="link">Quick Start</a>
    <a href="index.html" class="link">Launch App</a>
    <a href="test.html" class="link">Run Tests</a>
  </div>
</div>
<script>
setTimeout(() => {
  window.location.href = 'quickstart.html';
}, 2000);
</script>
</body>
</html>
