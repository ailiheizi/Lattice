# NextIM Store 配置文件示例
# 复制为 nextim-store.toml 并修改

# WebSocket 服务监听地址（其他 Store 节点连接用）
ws_addr = "0.0.0.0:9100"

# REST API 监听地址（手机端/Web 端调用）
api_addr = "0.0.0.0:9101"

# 数据存储目录（SQLite + Tantivy 索引）
data_dir = "./data"

# 显示名称
display_name = "My Store"

# 代收 Store 地址（离线时消息暂存到这里，留空则不启用）
proxy_store_address = ""

# REST 管理接口的 Bearer token（保护写操作：发消息/建房/删消息/踢人/注册设备等）。
# 留空则启动时自动生成一个并打印到日志——生产环境务必显式设置一个高强度随机值。
# 客户端调用写接口时需带 HTTP 头：Authorization: Bearer <token>
api_token = ""

# 是否接受无签名的消息/房间事件。默认 false（强制验签，推荐）。
# 仅在调试或旧协议迁移时显式设为 true，生产务必保持 false。
allow_unsigned = false
