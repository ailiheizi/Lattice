# Rust formatting configuration (stable rustfmt only)
# https://rust-lang.github.io/rustfmt/
#
# 注意：仅保留 stable channel 支持的配置项。
# 之前的 imports_granularity / group_imports / wrap_comments 等是 nightly-only，
# 在 stable 上会被忽略并产生 warning，且会导致本地(stable)与 CI 格式预期不一致，
# 故移除以保证 `cargo fmt --check` 在 CI(stable)上稳定通过。

max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
edition = "2021"
merge_derives = true
use_try_shorthand = true
use_field_init_shorthand = true
force_explicit_abi = true
