syntax = "proto3";
package lattice.message;

message Envelope {
    string msg_id = 1;
    string sender_fingerprint = 2;
    string recipient_fingerprint = 3;
    uint64 timestamp = 4; // origin_ts: sender-claimed timestamp, display only, not trusted, not signed.
    bytes signature = 5;
    bytes payload_hash = 6; // P1/P2 semantics: msg_hash over msg_id|sender|recipient|payload. prev_hashes excluded until P3.
    repeated bytes prev_hashes = 7; // Parent message hashes for future DAG ordering; stored in P2, not signed in P2.

    oneof payload {
        PlainPayload plain = 10;
        EncryptedPayload encrypted = 11;
    }
}

message PlainPayload {
    MessageContent content = 1;
}

message EncryptedPayload {
    bytes ciphertext = 1;
    string session_id = 2;
    uint32 message_index = 3;
    EncryptionType encryption_type = 4;
    // 加密套件版本(crypto agility):append-only,默认 0 = 当前套件。
    // 将来引入新算法时取新枚举值,旧消息仍按其自带 suite 解密。
    CryptoSuite crypto_suite = 5;
}

enum EncryptionType {
    OLM = 0;
    MEGOLM = 1;
}

// 加密套件标识(密钥协商/算法升级用)。新增套件一律追加新值,绝不复用/重排既有值。
enum CryptoSuite {
    // 当前唯一套件:Olm v1(1v1)+ Megolm v1(群组),vodozemac 实现。
    SUITE_OLM_V1_MEGOLM_V1 = 0;
}

message MessageContent {
    MessageType type = 1;
    string text = 2;
    bytes media = 3;
    string media_type = 4;
    string reply_to = 5;
}

enum MessageType {
    TEXT = 0;
    IMAGE = 1;
    FILE = 2;
    AUDIO = 3;
    VIDEO = 4;
    SYSTEM = 5;
}

message Message {
    string msg_id = 1;
    string room_id = 2;
    string sender_fingerprint = 3;
    uint64 timestamp = 4; // origin_ts from sender; semantic unchanged.
    MessageContent content = 5;
    bool encrypted = 6;
    bool verified = 7;
    EncryptedPayload encrypted_payload = 8;
    uint64 received_ts = 9; // Store-local receive timestamp in milliseconds since UNIX_EPOCH.
    repeated bytes prev_hashes = 10; // Stored DAG parents; not part of P2 msg_hash/signature yet.
    bytes msg_hash = 11; // P1/P2 msg_hash over msg_id|sender|recipient|payload; prev_hashes excluded until P3.
    bool redacted = 12; // tombstone: 被撤回后置 true(保留 DAG 节点,内容清空)
    bool edited = 13;   // 被编辑后置 true(content 已替换为新文本)
}

// 消息操作：撤回(redact)或编辑(edit)一条已存在的消息。
// 签名绑定 (op_id ‖ target_msg_id ‖ actor_fingerprint ‖ op_type ‖ new_text)，
// Store 验证 actor 必须等于原消息的 sender_fingerprint(只有原作者能撤回/编辑)。
// 撤回采用 tombstone:不物理删除原消息(保留 DAG hash 节点),只标记 redacted。
message MessageOp {
    string op_id = 1;
    string room_id = 2;
    string target_msg_id = 3;       // 被操作的原消息 ID
    string actor_fingerprint = 4;   // 发起者(必须 == 原消息 sender)
    MessageOpType op_type = 5;
    string new_text = 6;            // EDIT 时的新文本;REDACT 时为空
    uint64 timestamp = 7;           // 发起者声称时间(显示用,不进签名)
    bytes signature = 8;
}

enum MessageOpType {
    REDACT = 0;   // 撤回
    EDIT = 1;     // 编辑
}

// 消息反应(emoji)。任何人可对任意消息加/取消反应,只要签名证明是 actor 本人。
// 签名绑定 (reaction_id ‖ room_id ‖ target_msg_id ‖ actor_fingerprint ‖ emoji ‖ removed)。
// removed=true 表示取消之前的反应(按 actor+target+emoji 幂等)。
message Reaction {
    string reaction_id = 1;
    string room_id = 2;
    string target_msg_id = 3;
    string actor_fingerprint = 4;
    string emoji = 5;
    bool removed = 6;       // true=取消反应
    uint64 timestamp = 7;   // 声称时间(显示用,不进签名)
    bytes signature = 8;
}

// 已读回执:reader 已读到 up_to_msg_id(含)为止的消息。
// 每个 (room_id, reader_fingerprint) 只保留最新一条(按 up_to 推进)。
// 签名绑定 (room_id ‖ reader_fingerprint ‖ up_to_msg_id)。
message ReadReceipt {
    string room_id = 1;
    string reader_fingerprint = 2;
    string up_to_msg_id = 3;   // 已读到的最后一条消息 ID
    uint64 timestamp = 4;      // 声称时间(显示用,不进签名)
    bytes signature = 5;
}

// 正在输入状态(瞬态信令):不持久化、不进 DAG,仅广播给房间在线成员。
// typing=true 开始输入,false 停止。客户端通常每隔几秒重发以保活。
// 签名绑定 (room_id ‖ actor_fingerprint ‖ typing),防止伪造他人"正在输入"。
message Typing {
    string room_id = 1;
    string actor_fingerprint = 2;
    bool typing = 3;
    uint64 timestamp = 4;
    bytes signature = 5;
}


