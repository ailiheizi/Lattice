syntax = "proto3";
package lattice.transport;

import "message.proto";
import "identity.proto";
import "group.proto";

message Frame {
    uint64 seq = 1;
    FrameType type = 2;

    oneof body {
        lattice.message.Envelope message = 10;
        MessageAck ack = 11;
        lattice.identity.KeyBundle key_bundle = 20;
        KeyRequest key_request = 21;
        lattice.group.RoomEvent room_event = 30;
        lattice.message.MessageOp message_op = 31;
        lattice.message.Reaction reaction = 32;
        lattice.message.ReadReceipt read_receipt = 33;
        lattice.message.Typing typing = 34;
        SyncRequest sync_request = 40;
        SyncResponse sync_response = 41;
        Ping ping = 50;
        Pong pong = 51;
    }
}

enum FrameType {
    MESSAGE = 0;
    ACK = 1;
    KEY_BUNDLE = 2;
    KEY_REQUEST = 3;
    ROOM_EVENT = 4;
    MESSAGE_OP = 9;
    REACTION = 10;
    READ_RECEIPT = 11;
    TYPING = 12;
    SYNC_REQUEST = 5;
    SYNC_RESPONSE = 6;
    PING = 7;
    PONG = 8;
}

message MessageAck {
    string msg_id = 1;
    AckStatus status = 2;
}

enum AckStatus {
    RECEIVED = 0;
    DELIVERED = 1;
    READ = 2;
    REJECTED = 3;
}

message KeyRequest {
    string target_fingerprint = 1;
    string requester_fingerprint = 2;
}

message SyncRequest {
    uint64 since_timestamp = 1;
    repeated string room_ids = 2;
    string requester_fingerprint = 3;
    // 自证身份(Peer relay 取缓存时强制校验,防越权拉取他人缓存):
    // requester_public_key 的 SHA-256 必须等于 requester_fingerprint,
    // 且 signature 是该私钥对 (requester_fingerprint ‖ since_timestamp) 的签名。
    bytes requester_public_key = 4;
    bytes signature = 5;
}

message SyncTimelineItem {
    bytes msg_hash = 1;

    oneof item {
        lattice.message.Envelope message = 10;
        lattice.group.RoomEvent room_event = 11;
    }
}

message SyncResponse {
    repeated lattice.message.Envelope messages = 1;
    repeated lattice.group.RoomEvent events = 2;
    uint64 next_batch = 3;
    repeated SyncTimelineItem timeline = 4;
}

message Ping {
    uint64 timestamp = 1;
}

message Pong {
    uint64 timestamp = 1;
}
